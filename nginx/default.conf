# nginx virtual host: serves static files and reverse-proxies /api/ to the backend.
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Document root matches the bind mount in compose.yaml (./site).
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Custom 404 page served from the site directory.
    error_page 404 /404.html;

    # Static files: try the exact path, then a directory index, otherwise 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy: browser calls /api/foo, backend receives /foo on port 3000.
    # The trailing slash on proxy_pass strips the /api/ prefix.
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 404 page can only be reached via error_page, not by direct URL.
    location = /404.html {
        internal;
    }
}
