# Orchestrates three services: nginx (public entrypoint), backend (API), and db (PostgreSQL).
# Run from this directory: docker compose up -d
services:
  nginx:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      # Host port 8080 maps to nginx port 80 — visit http://localhost:8080
      - "8080:80"
    volumes:
      # Bind mount: local site files are served live without rebuilding the image.
      # :ro makes the mount read-only inside the container.
      - ./site:/usr/share/nginx/html:ro
      # Bind mount: edit nginx/default.conf locally and restart nginx to apply changes.
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    expose:
      # Port 3000 is reachable only on the Docker network (not published to the host).
      # nginx proxies /api/* requests to this service.
      - "3000"
    environment:
      # Connection settings for the pg client in backend/db.js
      PGHOST: db
      PGPORT: "5432"
      PGUSER: app
      PGPASSWORD: app
      PGDATABASE: guestbook
    depends_on:
      db:
        # Wait until PostgreSQL accepts connections before starting the API.
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: guestbook
    volumes:
      # Named volume keeps data across `docker compose down` (unless you add -v).
      - pgdata:/var/lib/postgresql/data
      # Runs once on first startup to create the initial schema.
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d guestbook"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
